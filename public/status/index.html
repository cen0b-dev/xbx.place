<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status — xbx.place</title>
  <meta name="robots" content="noindex, nofollow" />
  <script>window.__XBX__={supabaseUrl:"%%SUPABASE_URL%%",supabaseKey:"%%SUPABASE_ANON_KEY%%"};</script>
  <style>
    :root {
      --green:          #107C10;
      --red:            #E81123;
      --yellow:         #FFB900;
      --bg:             #101010;
      --tile:           #202020;
      --surface-card:   #1a1a1a;
      --surface-raised: #252525;
      --border:         #333333;
      --border-ctrl:    #3a3a3a;
      --text:           #ffffff;
      --text-body:      #cccccc;
      --text-sec:       #aaaaaa;
      --text-muted:     #888888;
      --font:           "Segoe UI","Helvetica Neue",sans-serif;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text-body); font-family: var(--font); font-size: 14px; -webkit-font-smoothing: antialiased; }
    a { color: var(--green); text-decoration: none; }
    a:hover { text-decoration: underline; }

    #login { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .login-card { width: 100%; max-width: 360px; background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 40px 36px; display: flex; flex-direction: column; gap: 22px; }
    .login-brand .site-name { font-size: 22px; font-weight: 700; color: var(--text); }
    .login-brand .page-name { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; margin-top: 4px; }
    .login-form { display: flex; flex-direction: column; gap: 10px; }
    .login-form input[type=password] { width: 100%; padding: 10px 14px; background: var(--tile); border: 1px solid var(--border-ctrl); border-radius: var(--r-sm); color: var(--text); font: inherit; font-size: 14px; outline: none; transition: border-color .15s; }
    .login-form input:focus { border-color: var(--green); }
    .login-form input::placeholder { color: var(--text-muted); }
    .login-form button { padding: 10px 14px; background: var(--green); border: none; border-radius: var(--r-sm); color: #fff; font: 600 14px var(--font); cursor: pointer; transition: filter .15s; }
    .login-form button:hover { filter: brightness(1.1); }
    .login-error { font-size: 13px; color: var(--red); display: none; }
    .login-error.show { display: block; }

    #app { display: none; min-height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }

    .header { position: sticky; top: 0; z-index: 100; background: rgba(16,16,16,.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); padding: 0 48px; height: 56px; display: flex; align-items: center; gap: 16px; }
    .header-brand { flex: 1; display: flex; align-items: baseline; gap: 10px; }
    .header-brand .site { font-size: 16px; font-weight: 700; color: var(--text); }
    .header-brand .slash { color: var(--border); }
    .header-brand .page { font-size: 14px; color: var(--text-muted); }
    .header-actions { display: flex; align-items: center; gap: 14px; }
    #countdown { font-size: 12px; color: var(--text-muted); }
    #refresh-btn { display: flex; align-items: center; gap: 6px; padding: 6px 14px; background: var(--surface-raised); border: 1px solid var(--border-ctrl); border-radius: var(--r-sm); color: var(--text-sec); font: 13px var(--font); cursor: pointer; transition: border-color .15s, color .15s; }
    #refresh-btn:hover { border-color: var(--green); color: var(--text); }
    #refresh-btn.spinning svg { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #logout-btn { background: none; border: none; color: var(--text-muted); font: 12px var(--font); cursor: pointer; padding: 4px; }
    #logout-btn:hover { color: var(--text); }

    main { flex: 1; padding: 40px 48px 64px; max-width: 1200px; width: 100%; margin: 0 auto; }
    .section-block { margin-bottom: 40px; }
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin-bottom: 16px; }

    .summary-bar { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .summary-group { display: flex; gap: 12px; flex-wrap: wrap; align-items: stretch; }
    .summary-group-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); width: 100%; margin-bottom: -4px; }
    .summary-chip { background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 16px; display: flex; flex-direction: column; gap: 2px; min-width: 110px; }
    .summary-chip .s-val { font-size: 22px; font-weight: 700; color: var(--text); }
    .summary-chip .s-lab { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }

    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 16px; }
    .status-card { background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--r-md); padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; transition: border-color .2s; }
    .status-card.is-up   { border-color: #1a2e1a; }
    .status-card.is-down { border-color: #2e1a1a; }
    .status-card.is-warn { border-color: #2e261a; }
    .status-card.is-muted { opacity: .72; }
    .card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .card-identity { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .card-label { font-size: 15px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-sub { font-size: 12px; color: var(--text-muted); font-family: ui-monospace,monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: var(--r-sm); font-size: 12px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .status-pill.up       { background: #0d2410; color: #4caf50; }
    .status-pill.down     { background: #2a0d0d; color: #ef5350; }
    .status-pill.warn     { background: #2a220d; color: var(--yellow); }
    .status-pill.muted    { background: var(--tile); color: var(--text-muted); }
    .status-pill.checking { background: var(--tile); color: var(--text-muted); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-pill.up   .status-dot { background: #4caf50; box-shadow: 0 0 6px #4caf5066; }
    .status-pill.down .status-dot { background: #ef5350; }
    .status-pill.warn .status-dot { background: var(--yellow); }
    .status-pill.muted .status-dot, .status-pill.checking .status-dot { background: var(--text-muted); }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-cell { background: var(--tile); border-radius: var(--r-sm); padding: 10px 12px; display: flex; flex-direction: column; gap: 3px; }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
    .stat-value { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
    .stat-sub   { font-size: 11px; color: var(--text-muted); }
    .stat-value.is-error { color: #ef5350; }
    .stat-value.is-warn  { color: var(--yellow); }
    .card-footer { font-size: 12px; color: var(--text-muted); }
    .analytics-note { font-size: 12px; color: var(--text-muted); grid-column: 1/-1; }

    #error-banner { display: none; background: #2a0d0d; border: 1px solid #5a1a1a; border-radius: var(--r-md); padding: 14px 18px; color: #ef9a9a; font-size: 13px; margin-bottom: 20px; }
    #error-banner.show { display: block; }

    .skeleton { background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--r-md); height: 210px; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:.65} }

    @media (max-width: 640px) {
      .header { padding: 0 20px; }
      main { padding: 24px 20px 48px; }
    }
  </style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <div class="login-brand">
      <div class="site-name">xbx.place</div>
      <div class="page-name">Status Dashboard</div>
    </div>
    <form class="login-form" id="login-form">
      <input type="password" id="pw" placeholder="Dashboard password" autocomplete="current-password" />
      <div class="login-error" id="login-err"></div>
      <button type="submit">Sign In</button>
    </form>
  </div>
</div>

<div id="app">
  <header class="header">
    <div class="header-brand">
      <span class="site">xbx.place</span>
      <span class="slash">/</span>
      <span class="page">status</span>
    </div>
    <div class="header-actions">
      <span id="countdown"></span>
      <button id="refresh-btn">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
          <path d="M14 8A6 6 0 1 1 3.34 3.76L5 5.5V1H.5L2.2 2.7A8 8 0 1 0 16 8h-2z"/>
        </svg>
        Refresh
      </button>
      <button id="logout-btn">Sign out</button>
    </div>
  </header>

  <main>
    <div id="error-banner"></div>
    <div class="summary-bar" id="summary-bar" style="display:none">
      <div class="summary-group">
        <div class="summary-group-title">Cloudflare Workers</div>
        <div class="summary-chip"><div class="s-val" id="s-w-total">—</div><div class="s-lab">Workers</div></div>
        <div class="summary-chip"><div class="s-val" id="s-w-up">—</div><div class="s-lab">Online</div></div>
        <div class="summary-chip"><div class="s-val" id="s-w-req">—</div><div class="s-lab">Requests 24 h</div></div>
        <div class="summary-chip"><div class="s-val" id="s-w-err">—</div><div class="s-lab">Errors 24 h</div></div>
      </div>
      <div class="summary-group">
        <div class="summary-group-title">Internet Archive</div>
        <div class="summary-chip"><div class="s-val" id="s-ia-total">—</div><div class="s-lab">Accounts</div></div>
        <div class="summary-chip"><div class="s-val" id="s-ia-valid">—</div><div class="s-lab">Valid</div></div>
        <div class="summary-chip"><div class="s-val" id="s-ia-uses">—</div><div class="s-lab">Uses 24 h</div></div>
        <div class="summary-chip"><div class="s-val" id="s-ia-err">—</div><div class="s-lab">Errors 24 h</div></div>
      </div>
    </div>

    <div class="section-block">
      <div class="section-label" id="workers-label">Cloudflare Workers (24 h)</div>
      <div class="card-grid" id="workers-grid"></div>
    </div>

    <div class="section-block">
      <div class="section-label" id="cookies-label">Internet Archive Cookies</div>
      <div class="card-grid" id="cookies-grid"></div>
    </div>
  </main>
</div>

<script>
(function () {
  const CFG = window.__XBX__ ?? {};
  const SUPABASE_URL = CFG.supabaseUrl || "";
  const SUPABASE_KEY = CFG.supabaseKey || "";
  const STATS_URL = SUPABASE_URL
    ? SUPABASE_URL.replace(/\/$/, "") + "/functions/v1/worker-stats"
    : "";

  function statsHeaders(pw) {
    const h = { "X-Dashboard-Password": pw };
    if (SUPABASE_KEY) {
      h.Authorization = `Bearer ${SUPABASE_KEY}`;
      h.apikey = SUPABASE_KEY;
    }
    return h;
  }

  const SESSION_KEY  = "xbx_dashboard_pw";
  const REFRESH_SECS = 60;

  let password  = sessionStorage.getItem(SESSION_KEY) ?? "";
  let countdown = REFRESH_SECS;
  let timer     = null;

  const loginEl      = document.getElementById("login");
  const appEl        = document.getElementById("app");
  const loginForm    = document.getElementById("login-form");
  const pwInput      = document.getElementById("pw");
  const loginErr     = document.getElementById("login-err");
  const workersGrid  = document.getElementById("workers-grid");
  const cookiesGrid  = document.getElementById("cookies-grid");
  const errBanner    = document.getElementById("error-banner");
  const refreshBtn   = document.getElementById("refresh-btn");
  const cntEl        = document.getElementById("countdown");
  const summaryBar   = document.getElementById("summary-bar");
  const workersLabel = document.getElementById("workers-label");
  const cookiesLabel = document.getElementById("cookies-label");

  function showError(msg) {
    loginErr.textContent = msg;
    loginErr.classList.toggle("show", !!msg);
  }

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const pw = pwInput.value.trim();
    if (!pw) { showError("Enter your password."); return; }
    if (!STATS_URL) { showError("Dashboard is not configured (missing Supabase URL)."); return; }

    showError("");
    try {
      const res = await fetch(STATS_URL, { headers: statsHeaders(pw) });
      if (res.status === 401) { showError("Incorrect password."); return; }
      if (!res.ok) { showError(`Error ${res.status} from stats endpoint.`); return; }
      password = pw;
      sessionStorage.setItem(SESSION_KEY, pw);
      showDashboard(await res.json());
    } catch {
      showError("Could not reach the stats endpoint. Is the Edge Function deployed?");
    }
  });

  document.getElementById("logout-btn").addEventListener("click", () => {
    sessionStorage.removeItem(SESSION_KEY);
    location.reload();
  });

  if (password && STATS_URL) {
    loginEl.style.display = "none";
    appEl.classList.add("visible");
    loadData();
  }

  function showDashboard(data) {
    loginEl.style.display = "none";
    appEl.classList.add("visible");
    render(data);
    startTimer();
  }

  refreshBtn.addEventListener("click", () => { clearInterval(timer); loadData(); });

  function startTimer() {
    countdown = REFRESH_SECS;
    cntEl.textContent = `Refreshes in ${countdown}s`;
    timer = setInterval(() => {
      countdown--;
      cntEl.textContent = `Refreshes in ${countdown}s`;
      if (countdown <= 0) { clearInterval(timer); loadData(); }
    }, 1000);
  }

  async function loadData() {
    clearInterval(timer);
    cntEl.textContent = "";
    refreshBtn.classList.add("spinning");
    setError(null);

    try {
      const res = await fetch(STATS_URL, { headers: statsHeaders(password) });
      if (res.status === 401) { sessionStorage.removeItem(SESSION_KEY); location.reload(); return; }
      if (!res.ok) { setError(`Stats endpoint returned ${res.status}.`); return; }
      render(await res.json());
    } catch (err) {
      setError(`Could not reach stats endpoint: ${err.message}`);
    } finally {
      refreshBtn.classList.remove("spinning");
      startTimer();
    }
  }

  function setError(msg) {
    errBanner.textContent = msg ?? "";
    errBanner.classList.toggle("show", !!msg);
  }

  function render({ workers, iaCookies, asOf }) {
    renderWorkers(workers ?? [], asOf);
    renderCookies(iaCookies ?? [], asOf);
    summaryBar.style.display = "flex";
  }

  function renderWorkers(workers, asOf) {
    workersLabel.textContent = `Cloudflare Workers (24 h) — ${time(asOf)}`;

    const totalUp  = workers.filter(w => w.deployment?.deployed).length;
    const totalReq = workers.reduce((s, w) => s + (w.analytics?.requests ?? 0), 0);
    const totalErr = workers.reduce((s, w) => s + (w.analytics?.errors   ?? 0), 0);
    document.getElementById("s-w-total").textContent = workers.length || "0";
    document.getElementById("s-w-up").textContent    = totalUp;
    document.getElementById("s-w-req").textContent   = fmt(totalReq);
    document.getElementById("s-w-err").textContent   = fmt(totalErr);

    if (!workers.length) {
      workersGrid.innerHTML = `<p style="color:var(--text-muted);font-size:13px">No workers configured yet.</p>`;
      return;
    }

    workersGrid.innerHTML = workers.map(w => {
      const deployed = w.deployment?.deployed ?? false;
      const statusClass = deployed ? "up" : "down";
      const statusLabel = deployed ? "Deployed" : "Not found";
      const an = w.analytics;
      const requests  = an ? fmt(an.requests)  : "—";
      const errors    = an ? fmt(an.errors)     : "—";
      const errorRate = an ? an.errorRate + "%" : "—";
      const cpuP50    = an?.cpuP50 != null ? an.cpuP50.toFixed(1) + " ms" : "—";
      const errCls    = an?.errorRate > 5 ? "is-error" : an?.errorRate > 1 ? "is-warn" : "";
      const urlHtml = w.workerUrl
        ? `<a href="${esc(w.workerUrl)}" target="_blank" rel="noopener">${esc(w.workerUrl.replace("https://",""))}</a>`
        : `<span style="color:var(--text-muted)">no URL</span>`;
      const analyticsNote = w.analyticsUnavailable
        ? `<div class="analytics-note">Analytics unavailable — enable Account Analytics:Read on your API token.</div>`
        : "";

      return `<div class="status-card ${deployed ? "is-up" : "is-down"}">
  <div class="card-head">
    <div class="card-identity">
      <div class="card-label">${esc(w.label)}</div>
      <div class="card-sub">${esc(w.workerName)}</div>
    </div>
    <div class="status-pill ${statusClass}"><div class="status-dot"></div>${statusLabel}</div>
  </div>
  <div class="stats-grid">
    <div class="stat-cell"><div class="stat-label">Requests</div><div class="stat-value">${requests}</div><div class="stat-sub">last 24 h</div></div>
    <div class="stat-cell"><div class="stat-label">Errors</div><div class="stat-value ${errCls}">${errors}</div><div class="stat-sub">${errorRate} error rate</div></div>
    <div class="stat-cell"><div class="stat-label">CPU P50</div><div class="stat-value">${cpuP50}</div><div class="stat-sub">avg</div></div>
    <div class="stat-cell"><div class="stat-label">Status</div><div class="stat-value" style="font-size:14px">${deployed ? "✓ Live" : "✗ Missing"}</div><div class="stat-sub">CF control plane</div></div>
    ${analyticsNote}
  </div>
  <div class="card-footer">${urlHtml}</div>
</div>`;
    }).join("");
  }

  function renderCookies(cookies, asOf) {
    cookiesLabel.textContent = `Internet Archive Cookies — checked ${time(asOf)}`;

    const enabled = cookies.filter(c => c.enabled);
    const valid   = enabled.filter(c => c.isValid && !c.expiredByDate);
    const uses24  = cookies.reduce((s, c) => s + (c.uses24h ?? 0), 0);
    const err24   = cookies.reduce((s, c) => s + (c.errors24h ?? 0), 0);
    document.getElementById("s-ia-total").textContent = cookies.length || "0";
    document.getElementById("s-ia-valid").textContent = valid.length;
    document.getElementById("s-ia-uses").textContent  = fmt(uses24);
    document.getElementById("s-ia-err").textContent   = fmt(err24);

    if (!cookies.length) {
      cookiesGrid.innerHTML = `<p style="color:var(--text-muted);font-size:13px">No IA accounts in the pool. Run <code>npm run ia-cookies</code>.</p>`;
      return;
    }

    cookiesGrid.innerHTML = cookies.map(c => {
      let pillClass = "muted";
      let pillLabel = "Disabled";
      let cardClass = "is-muted";

      if (c.enabled) {
        if (c.isValid && !c.expiredByDate) {
          pillClass = "up";
          pillLabel = "Valid";
          cardClass = "is-up";
        } else if (c.expiredByDate) {
          pillClass = "warn";
          pillLabel = "Expired";
          cardClass = "is-warn";
        } else {
          pillClass = "down";
          pillLabel = "Invalid";
          cardClass = "is-down";
        }
      }

      const errCls = c.errors24h > 0 ? "is-error" : c.errorCount > 0 ? "is-warn" : "";
      const expiry = c.expiresAt ? date(c.expiresAt) : "—";
      const lastUsed = c.lastUsedAt ? relTime(c.lastUsedAt) : "never";
      const validated = c.lastValidatedAt ? relTime(c.lastValidatedAt) : "—";
      const note = c.validationMessage && c.enabled && !c.isValid
        ? `<div class="analytics-note">${esc(c.validationMessage)}</div>`
        : "";

      return `<div class="status-card ${cardClass}${c.enabled ? "" : " is-muted"}">
  <div class="card-head">
    <div class="card-identity">
      <div class="card-label" title="${esc(c.label)}">${esc(c.label)}</div>
      <div class="card-sub">${c.enabled ? "enabled" : "disabled"}</div>
    </div>
    <div class="status-pill ${pillClass}"><div class="status-dot"></div>${pillLabel}</div>
  </div>
  <div class="stats-grid">
    <div class="stat-cell"><div class="stat-label">Total uses</div><div class="stat-value">${fmt(c.useCount)}</div><div class="stat-sub">all time</div></div>
    <div class="stat-cell"><div class="stat-label">Uses 24 h</div><div class="stat-value">${fmt(c.uses24h)}</div><div class="stat-sub">downloads + builds</div></div>
    <div class="stat-cell"><div class="stat-label">Errors</div><div class="stat-value ${errCls}">${fmt(c.errorCount)}</div><div class="stat-sub">${fmt(c.errors24h)} in 24 h</div></div>
    <div class="stat-cell"><div class="stat-label">Last used</div><div class="stat-value" style="font-size:14px">${esc(lastUsed)}</div><div class="stat-sub">session activity</div></div>
    ${note}
  </div>
  <div class="card-footer">Expires ${esc(expiry)} · Validated ${esc(validated)}</div>
</div>`;
    }).join("");
  }

  function fmt(n) {
    if (n == null) return "—";
    if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
    if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
    return String(n);
  }
  function time(iso) {
    try { return new Date(iso).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit", second:"2-digit" }); }
    catch { return iso; }
  }
  function date(iso) {
    try { return new Date(iso).toLocaleDateString([], { year:"numeric", month:"short", day:"numeric" }); }
    catch { return iso; }
  }
  function relTime(iso) {
    try {
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return "just now";
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 48) return `${hrs}h ago`;
      return date(iso);
    } catch { return iso; }
  }
  function esc(s) {
    return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
})();
</script>
</body>
</html>
