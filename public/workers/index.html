<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workers — xbx.place</title>
  <meta name="robots" content="noindex, nofollow" />
  <!-- Build-time injected by vite.config.ts -->
  <script>window.__XBX__={supabaseUrl:"%%SUPABASE_URL%%",supabaseKey:"%%SUPABASE_ANON_KEY%%"};</script>
  <style>
    :root {
      --green:          #107C10;
      --red:            #E81123;
      --yellow:         #FFB900;
      --bg:             #101010;
      --tile:           #202020;
      --surface-card:   #1a1a1a;
      --surface-raised: #252525;
      --border:         #333333;
      --border-ctrl:    #3a3a3a;
      --text:           #ffffff;
      --text-body:      #cccccc;
      --text-sec:       #aaaaaa;
      --text-muted:     #888888;
      --font:           "Segoe UI","Helvetica Neue",sans-serif;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text-body); font-family: var(--font); font-size: 14px; -webkit-font-smoothing: antialiased; }
    a { color: var(--green); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Login ── */
    #login { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .login-card { width: 100%; max-width: 360px; background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 40px 36px; display: flex; flex-direction: column; gap: 22px; }
    .login-brand .site-name { font-size: 22px; font-weight: 700; color: var(--text); }
    .login-brand .page-name { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; margin-top: 4px; }
    .login-form { display: flex; flex-direction: column; gap: 10px; }
    .login-form input[type=password] { width: 100%; padding: 10px 14px; background: var(--tile); border: 1px solid var(--border-ctrl); border-radius: var(--r-sm); color: var(--text); font: inherit; font-size: 14px; outline: none; transition: border-color .15s; }
    .login-form input:focus { border-color: var(--green); }
    .login-form input::placeholder { color: var(--text-muted); }
    .login-form button { padding: 10px 14px; background: var(--green); border: none; border-radius: var(--r-sm); color: #fff; font: 600 14px var(--font); cursor: pointer; transition: filter .15s; }
    .login-form button:hover { filter: brightness(1.1); }
    .login-error { font-size: 13px; color: var(--red); display: none; }
    .login-error.show { display: block; }

    /* ── App ── */
    #app { display: none; min-height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }

    /* ── Header ── */
    .header { position: sticky; top: 0; z-index: 100; background: rgba(16,16,16,.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); padding: 0 48px; height: 56px; display: flex; align-items: center; gap: 16px; }
    .header-brand { flex: 1; display: flex; align-items: baseline; gap: 10px; }
    .header-brand .site { font-size: 16px; font-weight: 700; color: var(--text); }
    .header-brand .slash { color: var(--border); }
    .header-brand .page { font-size: 14px; color: var(--text-muted); }
    .header-actions { display: flex; align-items: center; gap: 14px; }
    #countdown { font-size: 12px; color: var(--text-muted); }
    #refresh-btn { display: flex; align-items: center; gap: 6px; padding: 6px 14px; background: var(--surface-raised); border: 1px solid var(--border-ctrl); border-radius: var(--r-sm); color: var(--text-sec); font: 13px var(--font); cursor: pointer; transition: border-color .15s, color .15s; }
    #refresh-btn:hover { border-color: var(--green); color: var(--text); }
    #refresh-btn.spinning svg { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #logout-btn { background: none; border: none; color: var(--text-muted); font: 12px var(--font); cursor: pointer; padding: 4px; }
    #logout-btn:hover { color: var(--text); }

    /* ── Main ── */
    main { flex: 1; padding: 40px 48px 64px; max-width: 1200px; width: 100%; margin: 0 auto; }
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin-bottom: 16px; }

    /* ── Summary bar ── */
    .summary-bar { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .summary-chip { background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 16px; display: flex; flex-direction: column; gap: 2px; min-width: 120px; }
    .summary-chip .s-val { font-size: 22px; font-weight: 700; color: var(--text); }
    .summary-chip .s-lab { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }

    /* ── Worker grid ── */
    #workers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 16px; }
    .worker-card { background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--r-md); padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; transition: border-color .2s; }
    .worker-card.is-up   { border-color: #1a2e1a; }
    .worker-card.is-down { border-color: #2e1a1a; }
    .card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .card-identity { display: flex; flex-direction: column; gap: 3px; }
    .card-label { font-size: 15px; font-weight: 600; color: var(--text); }
    .card-worker-name { font-size: 12px; color: var(--text-muted); font-family: ui-monospace,monospace; }
    .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: var(--r-sm); font-size: 12px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .status-pill.up       { background: #0d2410; color: #4caf50; }
    .status-pill.down     { background: #2a0d0d; color: #ef5350; }
    .status-pill.checking { background: var(--tile); color: var(--text-muted); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-pill.up   .status-dot { background: #4caf50; box-shadow: 0 0 6px #4caf5066; }
    .status-pill.down .status-dot { background: #ef5350; }
    .status-pill.checking .status-dot { background: var(--text-muted); }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-cell { background: var(--tile); border-radius: var(--r-sm); padding: 10px 12px; display: flex; flex-direction: column; gap: 3px; }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
    .stat-value { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
    .stat-sub   { font-size: 11px; color: var(--text-muted); }
    .stat-value.is-error { color: #ef5350; }
    .stat-value.is-warn  { color: var(--yellow); }
    .card-footer { font-size: 12px; color: var(--text-muted); }
    .analytics-note { font-size: 12px; color: var(--text-muted); grid-column: 1/-1; }

    /* ── Error banner ── */
    #error-banner { display: none; background: #2a0d0d; border: 1px solid #5a1a1a; border-radius: var(--r-md); padding: 14px 18px; color: #ef9a9a; font-size: 13px; margin-bottom: 20px; }
    #error-banner.show { display: block; }

    /* ── Pulse skeletons ── */
    .skeleton { background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--r-md); height: 210px; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:.65} }

    @media (max-width: 640px) {
      .header { padding: 0 20px; }
      main { padding: 24px 20px 48px; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login">
  <div class="login-card">
    <div class="login-brand">
      <div class="site-name">xbx.place</div>
      <div class="page-name">Workers Dashboard</div>
    </div>
    <form class="login-form" id="login-form">
      <input type="password" id="pw" placeholder="Dashboard password" autocomplete="current-password" />
      <div class="login-error" id="login-err"></div>
      <button type="submit">Sign In</button>
    </form>
  </div>
</div>

<!-- Dashboard -->
<div id="app">
  <header class="header">
    <div class="header-brand">
      <span class="site">xbx.place</span>
      <span class="slash">/</span>
      <span class="page">workers</span>
    </div>
    <div class="header-actions">
      <span id="countdown"></span>
      <button id="refresh-btn">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
          <path d="M14 8A6 6 0 1 1 3.34 3.76L5 5.5V1H.5L2.2 2.7A8 8 0 1 0 16 8h-2z"/>
        </svg>
        Refresh
      </button>
      <button id="logout-btn">Sign out</button>
    </div>
  </header>

  <main>
    <div id="error-banner"></div>
    <div class="summary-bar" id="summary-bar" style="display:none">
      <div class="summary-chip"><div class="s-val" id="s-total">—</div><div class="s-lab">Workers</div></div>
      <div class="summary-chip"><div class="s-val" id="s-up">—</div><div class="s-lab">Online</div></div>
      <div class="summary-chip"><div class="s-val" id="s-req">—</div><div class="s-lab">Requests 24 h</div></div>
      <div class="summary-chip"><div class="s-val" id="s-err">—</div><div class="s-lab">Errors 24 h</div></div>
    </div>
    <div class="section-label" id="section-label">Workers (24 h)</div>
    <div id="workers-grid"></div>
  </main>
</div>

<script>
(function () {
  // Config injected at build time
  const CFG = window.__XBX__ ?? {};
  const SUPABASE_URL = CFG.supabaseUrl || "";
  const SUPABASE_KEY = CFG.supabaseKey || "";
  const STATS_URL    = SUPABASE_URL
    ? SUPABASE_URL.replace(/\/$/, "") + "/functions/v1/worker-stats"
    : "";

  function statsHeaders(pw) {
    const h = { "X-Dashboard-Password": pw };
    if (SUPABASE_KEY) {
      h.Authorization = `Bearer ${SUPABASE_KEY}`;
      h.apikey = SUPABASE_KEY;
    }
    return h;
  }

  const SESSION_KEY  = "xbx_dashboard_pw";
  const REFRESH_SECS = 60;

  let password  = sessionStorage.getItem(SESSION_KEY) ?? "";
  let countdown = REFRESH_SECS;
  let timer     = null;

  // ── Elements ──────────────────────────────────────────────────────────────
  const loginEl   = document.getElementById("login");
  const appEl     = document.getElementById("app");
  const loginForm = document.getElementById("login-form");
  const pwInput   = document.getElementById("pw");
  const loginErr  = document.getElementById("login-err");
  const gridEl    = document.getElementById("workers-grid");
  const errBanner = document.getElementById("error-banner");
  const refreshBtn= document.getElementById("refresh-btn");
  const cntEl     = document.getElementById("countdown");
  const summaryBar= document.getElementById("summary-bar");
  const secLabel  = document.getElementById("section-label");

  // ── Auth ──────────────────────────────────────────────────────────────────
  function showError(msg) {
    loginErr.textContent = msg;
    loginErr.classList.toggle("show", !!msg);
  }

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const pw = pwInput.value.trim();
    if (!pw) { showError("Enter your password."); return; }
    if (!STATS_URL) { showError("Dashboard is not configured (missing Supabase URL)."); return; }

    showError("");
    try {
      const res = await fetch(STATS_URL, { headers: statsHeaders(pw) });
      if (res.status === 401) { showError("Incorrect password."); return; }
      if (!res.ok) { showError(`Error ${res.status} from stats endpoint.`); return; }
      // success
      password = pw;
      sessionStorage.setItem(SESSION_KEY, pw);
      const data = await res.json();
      showDashboard(data);
    } catch {
      showError("Could not reach the stats endpoint. Is the Edge Function deployed?");
    }
  });

  document.getElementById("logout-btn").addEventListener("click", () => {
    sessionStorage.removeItem(SESSION_KEY);
    location.reload();
  });

  // ── Auto-restore session ──────────────────────────────────────────────────
  if (password && STATS_URL) {
    loginEl.style.display = "none";
    appEl.classList.add("visible");
    loadData();
  }

  // ── Dashboard ─────────────────────────────────────────────────────────────
  function showDashboard(data) {
    loginEl.style.display = "none";
    appEl.classList.add("visible");
    render(data);
    startTimer();
  }

  refreshBtn.addEventListener("click", () => { clearInterval(timer); loadData(); });

  function startTimer() {
    countdown = REFRESH_SECS;
    cntEl.textContent = `Refreshes in ${countdown}s`;
    timer = setInterval(() => {
      countdown--;
      cntEl.textContent = `Refreshes in ${countdown}s`;
      if (countdown <= 0) { clearInterval(timer); loadData(); }
    }, 1000);
  }

  async function loadData() {
    clearInterval(timer);
    cntEl.textContent = "";
    refreshBtn.classList.add("spinning");
    setError(null);

    try {
      const res = await fetch(STATS_URL, { headers: statsHeaders(password) });
      if (res.status === 401) { sessionStorage.removeItem(SESSION_KEY); location.reload(); return; }
      if (!res.ok) { setError(`Stats endpoint returned ${res.status}.`); return; }
      render(await res.json());
    } catch (err) {
      setError(`Could not reach stats endpoint: ${err.message}`);
    } finally {
      refreshBtn.classList.remove("spinning");
      startTimer();
    }
  }

  function setError(msg) {
    errBanner.textContent = msg ?? "";
    errBanner.classList.toggle("show", !!msg);
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render({ workers, asOf }) {
    if (!workers?.length) {
      gridEl.innerHTML = `<p style="color:var(--text-muted);font-size:13px">No workers configured yet.</p>`;
      return;
    }

    // Summary totals
    const totalUp  = workers.filter(w => w.deployment?.deployed).length;
    const totalReq = workers.reduce((s, w) => s + (w.analytics?.requests ?? 0), 0);
    const totalErr = workers.reduce((s, w) => s + (w.analytics?.errors   ?? 0), 0);
    document.getElementById("s-total").textContent = workers.length;
    document.getElementById("s-up").textContent    = totalUp;
    document.getElementById("s-req").textContent   = fmt(totalReq);
    document.getElementById("s-err").textContent   = fmt(totalErr);
    summaryBar.style.display = "flex";

    secLabel.textContent = `Workers (24 h) — ${time(asOf)}`;

    gridEl.innerHTML = workers.map(w => {
      const deployed = w.deployment?.deployed ?? false;
      const statusClass = deployed ? "up" : "down";
      const statusLabel = deployed ? "Deployed" : "Not found";

      const an = w.analytics;
      const requests  = an ? fmt(an.requests)  : "—";
      const errors    = an ? fmt(an.errors)     : "—";
      const errorRate = an ? an.errorRate + "%" : "—";
      const cpuP50    = an?.cpuP50 != null ? an.cpuP50.toFixed(1) + " ms" : "—";
      const errCls    = an?.errorRate > 5 ? "is-error" : an?.errorRate > 1 ? "is-warn" : "";

      const urlHtml = w.workerUrl
        ? `<a href="${esc(w.workerUrl)}" target="_blank" rel="noopener">${esc(w.workerUrl.replace("https://",""))}</a>`
        : `<span style="color:var(--text-muted)">no URL</span>`;

      const analyticsNote = w.analyticsUnavailable
        ? `<div class="analytics-note">Analytics unavailable — enable Account Analytics:Read on your API token.</div>`
        : "";

      return `<div class="worker-card ${deployed ? "is-up" : "is-down"}">
  <div class="card-head">
    <div class="card-identity">
      <div class="card-label">${esc(w.label)}</div>
      <div class="card-worker-name">${esc(w.workerName)}</div>
    </div>
    <div class="status-pill ${statusClass}">
      <div class="status-dot"></div>${statusLabel}
    </div>
  </div>
  <div class="stats-grid">
    <div class="stat-cell">
      <div class="stat-label">Requests</div>
      <div class="stat-value">${requests}</div>
      <div class="stat-sub">last 24 h</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Errors</div>
      <div class="stat-value ${errCls}">${errors}</div>
      <div class="stat-sub">${errorRate} error rate</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">CPU P50</div>
      <div class="stat-value">${cpuP50}</div>
      <div class="stat-sub">avg</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Status</div>
      <div class="stat-value" style="font-size:14px">${deployed ? "✓ Live" : "✗ Missing"}</div>
      <div class="stat-sub">CF control plane</div>
    </div>
    ${analyticsNote}
  </div>
  <div class="card-footer">${urlHtml}</div>
</div>`;
    }).join("");
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function fmt(n) {
    if (n == null) return "—";
    if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
    if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
    return String(n);
  }
  function time(iso) {
    try { return new Date(iso).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit", second:"2-digit" }); }
    catch { return iso; }
  }
  function esc(s) {
    return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
})();
</script>
</body>
</html>
