<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xbx.place</title>
<style>
:root{--green:#107C10;--bg:#101010;--tile:#202020;--text:#fff;--text-sec:#aaa;--font:'Segoe UI','Helvetica Neue',sans-serif;--t-w:170px;--t-h:235px}
body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;overflow-y:scroll}
::-webkit-scrollbar{width:12px;height:12px}
::-webkit-scrollbar-track{background:#151515}
::-webkit-scrollbar-thumb{background:#444;border:2px solid #151515}
::-webkit-scrollbar-thumb:hover{background:var(--green)}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:#252525 linear-gradient(90deg,#252525 25%,#333 50%,#252525 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:2px}
.header{padding:30px 60px 0;position:sticky;top:0;background:#101010f2;z-index:2500;backdrop-filter:blur(10px);border-bottom:1px solid #333;display:flex;flex-direction:column;gap:20px}
.top-bar,.controls{display:flex;align-items:center;justify-content:space-between}
.controls{gap:10px;justify-content:flex-end}
.brand h1{font-weight:300;font-size:2.2rem;margin:0;letter-spacing:-1px}
.brand span{color:var(--green);font-weight:600}
.pivots{display:flex;gap:40px;margin-top:10px}
.pivot{font-size:1.6rem;font-weight:300;text-transform:uppercase;cursor:pointer;color:#666;padding-bottom:10px;border-bottom:4px solid transparent;transition:0.2s}
.pivot:hover{color:#aaa}
.pivot.active{color:#fff;border-color:var(--green);font-weight:400}
.inp,.sel{background:#252525;border:2px solid #252525;color:#fff;padding:8px 15px;font:0.9rem var(--font);outline:0;transition:0.2s}
.inp:focus,.sel:focus{background:#1a1a1a;border-color:var(--green)}
.btn{background:#5865F2;color:#fff;border:0;padding:8px 20px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:8px;transition:0.2s}
.btn:hover{background:#4752c4}
.icon-btn{background:#252525;border:0;color:#fff;width:40px;height:40px;font-size:1.2rem;cursor:pointer;display:flex;justify-content:center;align-items:center}
.icon-btn:hover{background:#333;color:var(--green)}
.container{padding:40px 60px;max-width:1600px;margin:0 auto;min-height:80vh}
.hero-label,.sec-title{text-transform:uppercase;letter-spacing:1px;color:#ccc;font-weight:600}
.hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:0 0 60px;height:250px}
.hero-card{background:var(--tile);position:relative;cursor:pointer;overflow:hidden;border:2px solid transparent;box-shadow:0 10px 20px #0000004d;transition:0.2s}
.hero-card:hover{border-color:var(--green);transform:translateY(-5px) scale(1.02);z-index:10}
.hero-bg{width:100%;height:100%;object-fit:cover;opacity:0.7;transition:0.4s}
.hero-card:hover .hero-bg{opacity:0.4;transform:scale(1.05)}
.hero-info{position:absolute;bottom:0;width:100%;padding:15px 20px;background:linear-gradient(to top,#000000e6,transparent)}
.sec-title{font-size:1.2rem;color:var(--text-sec);margin-bottom:25px;display:flex;justify-content:space-between;border-bottom:1px solid #333;padding-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--t-w),1fr));gap:20px;padding-bottom:50px}
.tile{background:var(--tile);height:var(--t-h);position:relative;cursor:pointer;overflow:hidden;border:2px solid transparent;transition:0.2s;transform:translateZ(0)}
.tile.dim{filter:grayscale(100%);opacity:0.4}
.tile.dim:hover{filter:grayscale(0);opacity:1}
.tile:hover,.tile.active{transform:scale(1.05) translateZ(0);border-color:var(--green);box-shadow:0 10px 20px #0008;z-index:1002}
.tile.active{background:#252525}
.tile img{width:100%;height:100%;object-fit:cover}
.tile-ov{position:absolute;bottom:0;left:0;right:0;background:#000000d9;padding:10px;transform:translateY(100%);transition:0.2s}
.tile:hover .tile-ov,.tile.active .tile-ov{transform:translateY(0)}
.badge{display:inline-block;font-size:0.7rem;background:var(--green);padding:2px 6px;border-radius:2px;margin-top:4px}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000c;opacity:0;pointer-events:none;transition:0.2s;z-index:3000;display:flex;justify-content:center;align-items:center}
.overlay.show{opacity:1;pointer-events:all}
.blade{background:#1f1f1f;box-shadow:0 25px 50px #000c;transform:scale(0.95);transition:0.2s;display:flex;flex-direction:column;position:relative}
.overlay.show .blade{transform:scale(1)}
.blade.sm{width:400px;border-top:4px solid var(--green)}
.blade.lg{width:900px;height:600px;border-left:6px solid var(--green);flex-direction:row;overflow:hidden}
.settings-content{padding:30px 20px}
.group{margin-bottom:25px}
.group label{display:block;color:var(--green);font-weight:600;margin-bottom:10px;text-transform:uppercase;font-size:0.8rem}
.dots{display:flex;gap:8px}
.dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:0.2s}
.dot:hover{transform:scale(1.2)}
.dot.active{border-color:#fff}
.m-bg{position:absolute;width:100%;height:100%;object-fit:cover;opacity:.15;mask-image:linear-gradient(to bottom,#000 0,transparent 100%);pointer-events:none}
.m-l{width:320px;background:#151515f2;padding:30px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid #333;z-index:1}
.m-cover{width:100%;box-shadow:0 5px 25px #0008}
.m-r{flex:1;display:flex;flex-direction:column;overflow:hidden;z-index:1}
.m-head{padding:30px 30px 10px}
.m-head h2{margin:0;font-weight:300;font-size:2.2rem;line-height:1.1}
.m-banner{max-height:80px;margin-bottom:15px;object-fit:contain;object-position:left bottom}
.meta{display:flex;gap:15px;margin-top:10px;color:#888;font-size:0.9rem;align-items:center}
.stars{color:gold;letter-spacing:2px}
.tabs{display:flex;gap:30px;padding:0 30px;margin-top:20px;border-bottom:1px solid #ffffff1a}
.tab{font-size:1rem;text-transform:uppercase;letter-spacing:1px;padding-bottom:10px;cursor:pointer;color:#666;font-weight:600;transition:0.2s}
.tab:hover{color:#aaa}
.tab.active{color:var(--text);border-bottom:4px solid var(--green)}
.tab-c{padding:30px;overflow-y:auto;flex:1;display:none}
.tab-c.active{display:block;animation:fadeIn 0.3s}
.info-g{display:grid;grid-template-columns:1fr 1fr;gap:15px;background:#252525cc;padding:20px;font-size:0.85rem;margin-top:30px}
.info-l{color:var(--green);font-weight:600;text-transform:uppercase;font-size:0.75rem;display:block}
.dl-btn{display:flex;justify-content:space-between;align-items:center;background:#2a2a2a;color:#fff;text-decoration:none;padding:15px 20px;margin-bottom:10px;border-left:4px solid transparent;transition:0.2s}
.dl-btn:hover{background:#333;border-color:var(--green);transform:translateX(5px)}
.g-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.g-img{width:100%;border:2px solid #333;cursor:pointer}
.g-img:hover{border-color:var(--green)}
.close{position:absolute;top:10px;right:20px;background:0;border:0;color:#666;font-size:2rem;cursor:pointer;z-index:100}
.shelf{grid-column:1/-1;background:#181818;border-top:4px solid var(--green);border-bottom:1px solid #333;max-height:0;opacity:0;transition:0.3s;overflow:hidden}
.shelf.open{max-height:1000px;opacity:1;padding:20px 0;margin-bottom:20px}
.s-item{background:#252525;padding:15px;display:flex;align-items:center;justify-content:space-between;color:#fff;text-decoration:none;border-left:3px solid transparent;margin-bottom:10px}
.s-item:hover{background:#333;border-color:var(--green)}
.s-item.dis{opacity:0.5;pointer-events:none;filter:grayscale(1)}
#dimmer{position:fixed;top:0;left:0;width:100%;height:100%;background:#000d;z-index:1000;opacity:0;pointer-events:none;transition:0.2s}
body.dimmed #dimmer{opacity:1;pointer-events:all}
.footer{margin-top:80px;padding:40px 60px;border-top:1px solid #333;color:#666;font-size:0.9rem;display:flex;justify-content:space-between;background:#101010}
.footer a{color:#888;text-decoration:none;margin-left:20px}
.footer a:hover{color:var(--green)}
#btt{position:fixed;bottom:30px;right:30px;background:var(--green);color:#fff;width:50px;height:50px;display:flex;justify-content:center;align-items:center;font-size:1.5rem;cursor:pointer;opacity:0;pointer-events:none;transition:0.3s;z-index:2000;border-radius:50%;box-shadow:0 5px 15px #0008}
#btt.show{opacity:1;pointer-events:all}
@media(max-width:900px){.hero-grid{grid-template-columns:1fr;height:auto}.hero-card{height:200px}.blade.lg{flex-direction:column;height:90vh;width:95%}.m-l{width:100%;height:200px;flex-direction:row;padding:15px}.m-cover{width:auto;height:100%}}
</style>
</head>
<body>
<div id="dimmer" onclick="shelf(0)"></div>
<div id="btt" onclick="scrollTo({top:0,behavior:'smooth'})">↑</div>

<header class="header">
    <div class="top-bar">
        <div class="brand"><h1>xbx.<span>place</span></h1></div>
        <div class="controls">
            <input id="q" class="inp" placeholder="Search..." style="width:250px">
            <button class="icon-btn" onclick="openSet()">⚙</button>
            <a href="https://discord.gg/example" target="_blank" class="btn"><span>Join Discord</span></a>
        </div>
    </div>
    <div class="pivots">
        <div class="pivot active" id="p-Game" onclick="setCat('Game')">GAMES</div>
        <div class="pivot" id="p-DLC" onclick="setCat('DLC')">ADDONS & DLC</div>
    </div>
</header>

<div class="container">
        <div class="sec-title">
        <span id="lTitle">Featured & Top Rated</span>
        <div style="display:flex;gap:15px;align-items:center">
            <select id="sort" class="sel" style="padding:4px 10px"><option value="rating">Best Rated</option><option value="name">A-Z</option><option value="newest">Newest</option></select>
            <span id="cnt" style="font-size:0.9rem"></span>
        </div>
    </div>
    <div class="hero-grid" id="hGrid"></div>
    <div class="sec-title">
        <span id="lTitle">All Games</span>
        <div style="display:flex;gap:15px;align-items:center">
            <select id="sort" class="sel" style="padding:4px 10px"><option value="rating">Best Rated</option><option value="name">A-Z</option><option value="newest">Newest</option></select>
            <span id="cnt" style="font-size:0.9rem"></span>
        </div>
    </div>
    <div class="grid" id="grid"></div>
    <div id="sentinel" style="text-align:center;padding:20px;color:#666">Loading more...</div>
    <div id="dlcShelf" class="shelf"><div style="padding:0 20px"><div style="margin-bottom:15px;display:flex;justify-content:space-between;color:#ddd;font-size:1.2rem"><div id="sTitle"></div><button onclick="shelf(0)" style="background:0;border:0;color:#666;font-size:1.5rem;cursor:pointer">&times;</button></div><div id="sGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px"></div></div></div>
</div>

<div class="overlay" id="setMod">
    <div class="blade sm">
        <div class="m-head" style="background:#252525;padding:20px;display:flex;justify-content:space-between">
            <h2 style="font-size:1.5rem">Settings</h2><button class="close" onclick="closeSet()" style="position:static">&times;</button>
        </div>
        <div class="settings-content">
            <div class="group"><label>Theme Color</label><div class="dots" id="thPick"></div></div>
            <div class="group"><label>Default Region</label>
                <select id="reg" class="sel" style="width:100%"><option value="all">All Regions</option><option value="USA">🇺🇸 USA</option><option value="Europe">🇪🇺 Europe</option><option value="Japan">🇯🇵 Japan</option><option value="World">🌍 World / Region Free</option></select>
            </div>
        </div>
        <div style="padding:20px;background:#151515;text-align:right">
            <button class="btn" style="background:var(--green);display:inline-block" onclick="saveSet()">Save & Reload</button>
        </div>
    </div>
</div>

<footer class="footer">
    <div><div style="color:#fff;margin-bottom:5px;font-size:1.1rem">xbx.place</div><div>The premier archive for X360 content.</div></div>
    <div class="footer-links"><a href="#">About</a><a href="#">DMCA</a><a href="#">Donate</a><a href="https://discord.gg/example">Discord</a></div>
</footer>

<div class="overlay" id="modal">
    <div class="blade lg">
        <div style="position:absolute;width:100%;height:100%;z-index:0"><img id="m-bg" class="m-bg" src="" onerror="this.style.opacity=0"></div>
        <button class="close" onclick="closeMod()">&times;</button>
        <div class="m-l"><img src="" class="m-cover" id="m-cov" onerror="this.src='https://placehold.co/300x420/202020/ffffff.png?text=No+Cover'"></div>
        <div class="m-r">
            <div class="m-head">
                <img id="m-ban" class="m-banner" src="" onerror="this.style.display='none'">
                <h2 id="m-tit"></h2>
                <div class="meta"><div id="m-rate"></div><span id="m-yr"></span></div>
            </div>
            <div class="tabs">
                <div class="tab active" onclick="tab('ov',this)">Overview</div>
                <div class="tab" onclick="tab('dl',this)">Downloads</div>
                <div class="tab" onclick="tab('gal',this)">Gallery</div>
            </div>
            <div id="t-ov" class="tab-c active">
                <div id="m-desc" style="font-size:0.95rem;line-height:1.6;color:#ddd"></div>
                <div class="info-g">
                    <div><span class="info-l">Developer</span><span id="m-dev"></span></div>
                    <div><span class="info-l">Publisher</span><span id="m-pub"></span></div>
                    <div><span class="info-l">Regions</span><span id="m-reg"></span></div>
                </div>
            </div>
            <div id="t-dl" class="tab-c"><div id="dl-l"></div></div>
            <div id="t-gal" class="tab-c"><div id="g-g" class="g-grid"></div></div>
        </div>
    </div>
</div>

<script>
const $ = i => document.getElementById(i);
const CE = t => document.createElement(t);
const PATH = 'x360db/titles/';
const THEMES = [{c:'#107C10'},{c:'#0078D7'},{c:'#E81123'},{c:'#881798'},{c:'#FFB900'}];
let db=[], fDB=[], cnt=0, cat='Game', actT=null;
const cfg = { th: localStorage.getItem('x_th')||'#107C10', r: localStorage.getItem('x_r')||'all' };

document.documentElement.style.setProperty('--green', cfg.th);

// Init
(function(){
    const p = $('thPick');
    THEMES.forEach(t => {
        const d = CE('div'); d.className='dot'; d.style.background=t.c;
        d.onclick=()=>{ document.documentElement.style.setProperty('--green', t.c); document.querySelectorAll('.dot').forEach(x=>x.classList.remove('active')); d.classList.add('active'); cfg.th=t.c; };
        if(t.c===cfg.th) d.classList.add('active');
        p.appendChild(d);
    });
    $('reg').value = cfg.r;
    
    // Skeletons
    let h=''; for(let i=0;i<20;i++) h+='<div class="tile skeleton"><div class="tile-ov"></div></div>';
    $('grid').innerHTML = h;
})();

fetch('master_index.json?t='+Date.now()).then(r=>r.json()).then(d=>{
    const m = new Map();
    d.forEach(g=>{
        const n=g.name.toLowerCase().trim();
        const ex=m.get(n);
        const s = (g.rating||0) + (g.developer?1:0);
        if(!ex || s > ((ex.rating||0)+(ex.developer?1:0))) m.set(n,g);
    });
    db = Array.from(m.values());
    initHero(); filt(); scroll();
    const p = new URLSearchParams(location.search).get('title');
    if(p){ const g=db.find(x=>x.title_id===p); if(g) openMod(g,0); }
}).catch(e=>$('grid').innerHTML='<div style="color:red;padding:20px">Error loading DB</div>');

window.onpopstate = () => {
    const p = new URLSearchParams(location.search).get('title');
    p ? openMod(db.find(x=>x.title_id===p),0) : closeMod(0);
};

window.onscroll = () => $('btt').classList.toggle('show', window.scrollY > 500);

function initHero(){
    let c = db.filter(g=>g.rating>=4.5 && !/demo|beta/i.test(g.name) && (cfg.r==='all'||(g.regions||[]).includes(cfg.r)));
    if(c.length<3) c=db.filter(g=>g.rating>=4.0);
    const top = c.sort(()=>Math.random()-.5).slice(0,3);
    const hG = $('hGrid'); hG.innerHTML='';
    top.forEach(g=>{
        const d=CE('div'); d.className='hero-card'; d.onclick=()=>openMod(g);
        d.innerHTML=`<img class="hero-bg" src="${PATH}${g.title_id}/artwork/background.jpg"><div class="hero-info"><div style="font-size:1.4rem;text-shadow:0 2px 4px #000">${g.name}</div><div style="color:var(--green)">${getStars(g.rating)}</div></div>`;
        hG.appendChild(d);
    });
}

function filt(){
    $('dlcShelf').remove(); 
    const q=$('q').value.toLowerCase(), r=cfg.r, s=$('sort').value;
    fDB = db.filter(g=>{
        if(/demo|beta|trial/i.test(g.name)) return 0;
        let n = g.name.toLowerCase();
        // Simple alias check could go here if needed
        const match = n.includes(q) || (cat==='DLC' && g.downloads.some(d=>(d.type==='DLC'||d.type==='Update') && d.filename.toLowerCase().includes(q)));
        const catM = cat==='Game' ? (g.downloads.length===0 || g.downloads.some(d=>d.type==='Game'||!d.type)) : g.downloads.some(d=>d.type==='DLC'||d.type==='Update');
        const regM = r==='all' || (g.regions && (g.regions.includes(r)||g.regions.includes('World')));
        return cat==='DLC' ? (match && catM) : (match && regM && catM);
    });
    
    fDB.sort((a,b)=> s==='name'?a.name.localeCompare(b.name) : s==='rating'?(b.rating||0)-(a.rating||0) : b.title_id.localeCompare(a.title_id));
    $('cnt').innerText = fDB.length+' found';
    $('grid').innerHTML=''; cnt=0; actT=null; load();
}

function load(){
    const b = fDB.slice(cnt, cnt+50);
    if(!b.length){ $('sentinel').style.display='none'; return; }
    $('sentinel').style.display='block';
    const frag = document.createDocumentFragment();
    b.forEach(g=>{
        const t = CE('div'); t.className='tile skeleton';
        if(!g.downloads?.length) t.classList.add('dim');
        t.onclick = cat==='DLC' ? (e)=>shelf(e,t,g) : ()=>openMod(g);
        const img = new Image();
        img.src = `${PATH}${g.title_id}/artwork/boxart.jpg`;
        img.onload=()=>t.classList.remove('skeleton');
        img.onerror=()=>{img.src=`https://placehold.co/170x235/202020/ffffff.png?text=${encodeURIComponent(g.name)}`;t.classList.remove('skeleton')};
        
        let bdg = cat==='DLC' ? 'DLC Inside' : (g.downloads.some(d=>d.type==='DLC')?'Has Addons':'');
        t.appendChild(img);
        t.innerHTML += `<div class="tile-ov"><div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${g.name}</div>${bdg?`<span class="badge">${bdg}</span>`:''}</div>`;
        frag.appendChild(t);
    });
    $('grid').appendChild(frag);
    cnt+=b.length;
}

function setupInfiniteScroll() { /* Replaced by simpler IntersectionObserver below */ }
const obs = new IntersectionObserver(e=>{ if(e[0].isIntersecting && cnt<fDB.length) load(); }, {rootMargin:'200px'});
obs.observe($('sentinel'));

function setCat(c){
    cat=c; shelf(0);
    $('p-Game').classList.toggle('active', c==='Game'); $('p-DLC').classList.toggle('active', c==='DLC');
    $('lTitle').innerText = c==='Game'?'All Games':'Addons & DLC';
    filt();
}

// UI
function openSet(){ $('setMod').classList.add('show'); }
function closeSet(){ $('setMod').classList.remove('show'); }
function saveSet(){ 
    localStorage.setItem('x_th', cfg.th); localStorage.setItem('x_r', cfg.r=$('reg').value);
    closeSet(); filt(); initHero();
}

function shelf(e,t,g){
    if(!e || actT===t){ 
        $('dlcShelf').classList.remove('open'); document.body.classList.remove('dimmed'); 
        if(actT) actT.classList.remove('active'); actT=null; return; 
    }
    if(e.stopPropagation) e.stopPropagation();
    if(actT) actT.classList.remove('active');
    actT=t; t.classList.add('active'); document.body.classList.add('dimmed');
    
    $('sTitle').innerHTML = `<img src="${PATH}${g.title_id}/artwork/icon.png" style="width:24px;vertical-align:middle;margin-right:10px" onerror="this.style.display='none'">${g.name} Addons`;
    const sg = $('sGrid'); sg.innerHTML='';
    g.downloads.filter(d=>d.type==='DLC'||d.type==='Update').forEach(d=>{
        const a = CE('a'); a.className = d.url?'s-item':'s-item dis';
        if(d.url) { a.href=d.url; a.target='_blank'; }
        a.onclick=ev=>ev.stopPropagation();
        const nm = d.filename.replace(/\.zip$|\.iso$|\(World\)|\(USA\)|\(Europe\)|\(Japan\)|\(Addon\)|\(DLC\)|\(Update\)|\[.*?\]/gi,'').trim();
        a.innerHTML = `<div><div style="font-size:0.7rem;color:#888">${d.type==='Update'?'UPDATE':'ADDON'}</div><b>${nm}</b></div><span style="color:var(--green)">⬇</span>`;
        sg.appendChild(a);
    });
    
    // Insert after current row
    let next = t.nextElementSibling;
    while(next && next.offsetTop === t.offsetTop && next.id !== 'sentinel') next = next.nextElementSibling;
    $('grid').insertBefore($('dlcShelf'), next);
    setTimeout(()=>{$('dlcShelf').classList.add('open'); $('dlcShelf').scrollIntoView({behavior:'smooth',block:'nearest'})},50);
}

function openMod(g, push=1){
    tab('ov');
    $('m-tit').innerText = g.name;
    $('m-desc').innerText = g.description || "No description.";
    $('m-dev').innerText = g.developer || "-";
    $('m-pub').innerText = g.publisher || "-";
    $('m-reg').innerText = (g.regions||[]).join(', ') || '-';
    $('m-rate').innerHTML = getStars(g.rating);
    $('m-cov').src = `${PATH}${g.title_id}/artwork/boxart.jpg`;
    $('m-bg').src = `${PATH}${g.title_id}/artwork/background.jpg`;
    const ban = $('m-ban'); ban.style.display='block'; ban.src = `${PATH}${g.title_id}/artwork/banner.png`;
    
    const dl=$('dl-l'); dl.innerHTML='';
    if(g.downloads?.length) g.downloads.forEach(d=>{
        if(!d.url) return;
        const n = d.filename.replace(/\.zip$|\.iso$|\(World\)|\(USA\)|\(Europe\)|\(Japan\)|\[.*?\]/gi,'').trim();
        dl.innerHTML += `<a href="${d.url}" target="_blank" class="dl-btn"><div><div style="font-size:0.7rem;color:#aaa">${(d.type||'GAME').toUpperCase()}</div><b>${n}</b></div><span>⬇</span></a>`;
    }); else dl.innerHTML='<div style="color:#666">No downloads.</div>';

    const gal=$('g-g'); gal.innerHTML='';
    if(g.artwork?.gallery?.length) g.artwork.gallery.forEach(s=>{
        const u = s.startsWith('http') ? `https://images.weserv.nl/?url=${encodeURIComponent(s)}` : `${PATH}${g.title_id}/artwork/${s}`;
        gal.innerHTML += `<img class="g-img" src="${u}" loading="lazy" onclick="window.open(this.src)">`;
    }); else gal.innerHTML='<div style="color:#666;grid-column:1/-1">No images.</div>';

    if(push) history.pushState({id:g.title_id},'',`?title=${g.title_id}`);
    $('modal').classList.add('show');
}

function closeMod(push=1){
    $('modal').classList.remove('show');
    if(push) history.pushState(null,'',location.pathname);
}

function tab(n, el){
    document.querySelectorAll('.tab-c').forEach(e=>e.classList.remove('active'));
    $('t-'+n).classList.add('active');
    if(el){ document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active')); el.classList.add('active'); }
}

function getStars(r){
    let h='<span class="stars">'; r=Math.round(r||0);
    for(let i=0;i<5;i++) h+=i<r?'★':'<span style="color:#444">★</span>';
    return h+'</span>';
}

// Bind Inputs
$('q').onkeyup = filt; $('sort').onchange = filt;
$('modal').onclick = (e) => { if(e.target===$('modal')) closeMod(); };
$('setMod').onclick = (e) => { if(e.target===$('setMod')) closeSet(); };
</script>
